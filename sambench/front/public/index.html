<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="https://code.jquery.com/jquery-2.1.1.min.js" type="text/javascript"></script>
	<!-- select2 -->
	<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
	<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
	<title>SAMBench</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			line-height: 1.6;
			margin: 0;
			padding: 20px;
			background-color: #f4f4f4;
		}

		.container {
			max-width: 950px;
			margin: 0 auto;
			background-color: #fff;
			padding: 20px;
			border-radius: 5px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
		}

		h1 {
			text-align: center;
			color: #333;
		}

		label {
			display: block;
			margin-bottom: 5px;
		}

		select,
		.select2-hidden-accessible,
		input[type="text"],
		input[type="number"],
		button {
			width: 100%;
			padding: 10px;
			/* 패딩을 조금 늘립니다 */
			margin-bottom: 20px;
			border: 1px solid #ddd;
			border-radius: 4px;
			box-sizing: border-box;
			/* 박스 사이징을 추가합니다 */
			height: 40px;
			/* 모든 요소의 높이를 동일하게 설정합니다 */
			font-size: 16px;
			/* 폰트 크기를 지정합니다 */
		}

		/* Select2 컨테이너에 대한 스타일 추가 */
		.select2-container {
			margin-bottom: 20px;
			/* 다른 입력 요소들과 동일한 마진 */
		}

		.select2-container .select2-selection--multiple {
			min-height: 40px;
		}

		.select2-container .select2-search--inline .select2-search__field {
			margin-top: 10px;
		}

		/* 필요하다면 Select2 드롭다운의 위치를 조정 */
		.select2-container--default .select2-selection--multiple .select2-selection__rendered {
			padding-bottom: 5px;
		}

		button {
			background-color: #5cb85c;
			color: white;
			border: none;
			cursor: pointer;
			transition: background-color 0.3s;
			/* 부드러운 색상 전환 효과를 추가합니다 */
		}

		button:hover {
			background-color: #4cae4c;
		}

		#error,
		#loading {
			margin-top: 20px;
			padding: 10px;
			border-radius: 4px;
			text-align: center;
		}

		#error {
			background-color: #f2dede;
			color: #a94442;
			display: none;
		}

		#loading {
			display: none;
			background-color: #e6e6e6;
			color: #333;
		}

		.spinner {
			border: 4px solid #f3f3f3;
			border-top: 4px solid #3498db;
			border-radius: 50%;
			width: 20px;
			height: 20px;
			animation: spin 1s linear infinite;
			display: inline-block;
			margin-right: 10px;
		}

		@keyframes spin {
			0% {
				transform: rotate(0deg);
			}

			100% {
				transform: rotate(360deg);
			}
		}

		iframe {
			border: 1px solid #ddd;
		}

		#iframeContainer {
			display: none;
			margin-top: 20px;
		}

		.iframeRow {
			display: flex;
			justify-content: space-between;
			margin-bottom: 20px;
		}

		#querySelect {
			margin-top: 20px;
			margin-bottom: 20px;
		}

		.tablink {
			background-color: #f1f1f1;
			color: black;
			float: left;
			border: none;
			outline: none;
			cursor: pointer;
			padding: 14px 16px;
			font-size: 17px;
			width: 50%;
		}

		.tablink:hover {
			background-color: #ddd;
		}

		.tabcontent {
			display: none;
			padding: 20px;
			border-top: none;
		}

		.tablink.active {
			background-color: #ddd;
		}

		#QueryTab {
			display: block;
			/* 초기에 Query 탭 내용을 보이게 설정 */
		}

		#bottomSection {
			display: flex;
			justify-content: space-between;
			margin-top: 20px;
		}

		.infoSection {
			width: 48%;
			/* 약간의 여백을 두기 위해 50%보다 작게 설정 */
		}

		#fragmentationInfo {
			height: 200px;
			border: 1px solid #ddd;
			padding: 10px;
			box-sizing: border-box;
			background-color: #f9f9f9;
		}

		.infoSection h2 {
			margin-bottom: 10px;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1>SAMBench</h1>
		<div id="tabs">
			<button class="tablink active" data-tab="QueryTab" id="defaultOpen">Query</button>
			<button class="tablink" data-tab="AdjustDBTab">Configuration</button>
		</div>

		<div id="QueryTab" class="tabcontent">
			<form id="queryForm">
				<label for="workId">Work ID:</label>
				<input type="text" id="workId" required>

				<label for="taskId">Task ID:</label>
				<input type="number" id="taskId" required>

				<label for="dbPath">Database Path:</label>
				<input type="text" id="dbPath" required>

				<label for="queries">Select Queries:</label>
				<select id="queries" multiple required style="height: 40px;"></select>

				<label for="count">Count:</label>
				<input type="number" id="count" required min="1" value="1">

				<button type="submit">Submit</button>
			</form>

			<!-- 진행 상황을 표시 -->
			<div id="progressCounter" style="display: none; margin-top: 10px;">
				Progress: <span id="currentProgress">0</span> / <span id="totalProgress">0</span>
			</div>

			<div id="loading">
				<div class="spinner"></div>Processing request...
			</div>
			<div id="error"></div>
			<select id="querySelect" style="display: none;"></select>
		</div>

		<div id="AdjustDBTab" class="tabcontent">
			<h2>Evaluation Configuration</h2>
			<form id="adjustDBForm">
				<label for="systemAvailability">System Availability (%):</label>
				<input type="number" id="systemAvailability" min="0" max="100" required>

				<label for="fragmentationDistance">Fragmentation Distance:</label>
				<input type="number" id="fragmentationDistance" required>

				<label for="dbPageSize">Database Page Size:</label>
				<select id="dbPageSize" required>
					<option value="4KB">4KB</option>
					<option value="16KB">16KB</option>
				</select>

				<button type="submit">Apply Changes</button>
			</form>
		</div>

		<div id="iframeContainer">
			<div id="queryInfoSection">
				<h2>Query Info</h2>
				<div class="iframeRow">
					<iframe id="iframe1" width="450" height="500" frameborder="0"></iframe>
					<iframe id="iframe2" width="450" height="500" frameborder="0"></iframe>
				</div>
				<div class="iframeRow">
					<iframe id="iframe3" width="450" height="267" frameborder="0"></iframe>
					<iframe id="iframe4" width="450" height="267" frameborder="0"></iframe>
				</div>
			</div>
			<div id="bottomSection">
				<div class="infoSection">
					<h2>System Info</h2>
					<div class="iframeRow">
						<iframe id="iframe5" width="450" height="200" frameborder="0"></iframe>
					</div>
				</div>
				<div class="infoSection">
					<h2>Fragmentation</h2>
					<div id="fragmentationInfo">
						<p>Number of extents: <span id="extentsCount">-</span></p>
						<p>Max distance: <span id="maxDistance">-</span> GB</p>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script>
		// 전역 변수로 쿼리 선택 드롭다운의 가시성 상태를 저장
		let isQuerySelectVisible = false;

		function openTab(tabName, elmnt) {
			var tabcontent = document.getElementsByClassName("tabcontent");
			for (var i = 0; i < tabcontent.length; i++) {
				tabcontent[i].style.display = "none";
			}
			var tablinks = document.getElementsByClassName("tablink");
			for (var i = 0; i < tablinks.length; i++) {
				tablinks[i].classList.remove("active");
			}
			document.getElementById(tabName).style.display = "block";
			elmnt.classList.add("active");

			// 추가적인 요소 표시/숨김 처리
			const iframeContainer = document.getElementById('iframeContainer');
			const querySelect = document.getElementById('querySelect');
			if (tabName === 'QueryTab') {
				iframeContainer.style.display = 'block';
				querySelect.style.display = isQuerySelectVisible ? 'block' : 'none';
			} else {
				iframeContainer.style.display = 'none';
				querySelect.style.display = 'none';
			}
		}

		function populateQuerySelect(queries) {
			const querySelect = document.getElementById('querySelect');
			querySelect.innerHTML = '';
			queries.forEach(query => {
				const option = document.createElement('option');
				option.value = query;
				option.textContent = query;
				querySelect.appendChild(option);
			});
			querySelect.style.display = 'block';
			isQuerySelectVisible = true; // 상태 업데이트
		}

		document.addEventListener('DOMContentLoaded', function () {
			const form = document.getElementById('queryForm');
			const workIdInput = document.getElementById('workId');
			const taskIdInput = document.getElementById('taskId');
			const dbPathInput = document.getElementById('dbPath');
			const queriesSelect = document.getElementById('queries');
			const errorDiv = document.getElementById('error');
			const loadingDiv = document.getElementById('loading');
			const iframeContainer = document.getElementById('iframeContainer');
			const host = window.location.hostname; // 현재 호스트를 추출

			// 기본 쿼리 목록
			const defaultQueries = [
				's1.sql', 'i2.sql', 'm1.sql', 'g1.sql', 't2.sql'
			];

			// 쿼리 옵션 추가 및 기본 선택
			defaultQueries.forEach(query => {
				const option = document.createElement('option');
				option.value = query;
				option.textContent = query;
				option.selected = true;  // 모든 옵션을 기본적으로 선택
				queriesSelect.appendChild(option);
			});

			// Select2 초기화 수정
			$(queriesSelect).select2({
				placeholder: 'Select queries',
				width: '100%',
				containerCssClass: 'select2-container--default select2-container--focus',
				dropdownCssClass: 'select2-dropdown select2-dropdown--below'
			});

			form.addEventListener('submit', handleSubmit);
			querySelect.addEventListener('change', updateIframes);


			let currentCount = 0;
			let totalCount = 0;

			function handleSubmit(e) {
				e.preventDefault();
				const workId = workIdInput.value;
				const taskId = taskIdInput.value;
				const dbPath = dbPathInput.value;
				const selectedQueries = Array.from(queriesSelect.selectedOptions).map(option => option.value);
				const count = parseInt(document.getElementById('count').value);

				if (!dbPath) {
					showError('Please enter a database path.');
					return;
				}

				if (selectedQueries.length === 0) {
					showError('Please select at least one query.');
					return;
				}

				currentCount = 0;
				totalCount = count;

				showLoading();
				showIframes();
				populateQuerySelect(selectedQueries);
				updateIframes();
				updateProgressCounter();

				makeApiCall();
			}

			function makeApiCall() {
				if (currentCount >= totalCount) {
					hideLoading();
					return;
				}

				const workId = workIdInput.value;
				const taskId = taskIdInput.value;
				const dbPath = dbPathInput.value;
				const selectedQueries = Array.from(queriesSelect.selectedOptions).map(option => option.value);

				const url = new URL(`http://${host}:3000/works/${workId}/tasks/${taskId}`);
				url.searchParams.append('dbPath', dbPath);

				fetch(url, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
					},
					body: JSON.stringify({ queries: selectedQueries }),
				})
					.then(response => {
						if (!response.ok) {
							throw new Error(`HTTP error! status: ${response.status}`);
						}
						return;
					})
					.then(data => {
						currentCount++;
						updateProgressCounter();
						updateIframes();
						makeApiCall(); // 다음 API 호출
					})
					.catch(error => {
						console.error('Error:', error);
						showError(`Error: ${error.message}`);
						hideLoading();
					});
			}

			function updateProgressCounter() {
				const progressCounter = document.getElementById('progressCounter');
				const currentProgressSpan = document.getElementById('currentProgress');
				const totalProgressSpan = document.getElementById('totalProgress');

				progressCounter.style.display = 'block';
				currentProgressSpan.textContent = currentCount;
				totalProgressSpan.textContent = totalCount;
			}

			function showLoading() {
				document.getElementById('loading').style.display = 'block';
				document.getElementById('error').style.display = 'none';
				document.getElementById('progressCounter').style.display = 'block';
			}

			function hideLoading() {
				document.getElementById('loading').style.display = 'none';
				document.getElementById('querySelect').style.display = 'block';
				// 모든 호출이 완료된 후에도 진행 상황은 계속 표시
			}

			function updateIframes() {
				const dbPath = dbPathInput.value;
				const selectedQuery = querySelect.value;
				const workId = workIdInput.value;

				const baseUrl = `http://${host}:3001/d-solo/ef65d611-b39a-42fc-89f4-e1efbe9a63ab/dashboard`;
				const commonParams = `orgId=1&refresh=5s&var-work=${workId}&var-query=${selectedQuery}&theme=light`;

				document.getElementById('iframe1').src = `${baseUrl}?${commonParams}&panelId=15`;
				document.getElementById('iframe2').src = `${baseUrl}?${commonParams}&panelId=8`;
				document.getElementById('iframe3').src = `${baseUrl}?${commonParams}&panelId=1`;
				document.getElementById('iframe4').src = `${baseUrl}?${commonParams}&panelId=7`;
				document.getElementById('iframe5').src = `${baseUrl}?${commonParams}&panelId=4`;

				// Fragmentation 정보 업데이트
				updateFragmentationInfo();
			}

			function updateFragmentationInfo() {
				const dbPath = dbPathInput.value;
				const host = window.location.hostname;

				// Number of extents 가져오기
				fetch(`http://${host}:3000/adb/db/frag_count?dbPath=${encodeURIComponent(dbPath)}`)
					.then(response => response.text())
					.then(data => {
						document.getElementById('extentsCount').textContent = data.trim();
					})
					.catch(error => console.error('Error fetching frag_count:', error));

				// Max distance 가져오기
				fetch(`http://${host}:3000/adb/db/max_dis?dbPath=${encodeURIComponent(dbPath)}`)
					.then(response => response.text())
					.then(data => {
						const maxDistance = data.trim().split(' ').pop();
						document.getElementById('maxDistance').textContent = (parseInt(maxDistance) * 4 / 1024 / 1024).toFixed(2); // GB로 변환
					})
					.catch(error => console.error('Error fetching max_dis:', error));
			}

			function parseWorkValue(dbPath) {
				const parts = dbPath.split('.');
				if (parts.length >= 3 && parts[parts.length - 2] === 'frag') {
					return `${parts[parts.length - 3]}KB_frag`;
				}
				return '16KB_frag_reboot'; // Default value
			}

			function showIframes() {
				iframeContainer.style.display = 'block';
			}

			function showError(message) {
				errorDiv.textContent = message;
				errorDiv.style.display = 'block';
			}

			const adjustDBForm = document.getElementById('adjustDBForm');
			adjustDBForm.addEventListener('submit', handleAdjustDB);

			// 페이지 로드 시 Query 탭을 기본으로 열기
			openTab('QueryTab', document.getElementById('defaultOpen'));

			// 탭 버튼에 이벤트 리스너 추가
			document.querySelectorAll('.tablink').forEach(tab => {
				tab.addEventListener('click', function (event) {
					event.preventDefault(); // 기본 동작 방지
					openTab(this.getAttribute('data-tab'), this);
				});
			});

			function handleAdjustDB(e) {
				e.preventDefault();
				const systemAvailability = document.getElementById('systemAvailability').value;
				const fragmentationDistance = document.getElementById('fragmentationDistance').value;
				const dbPageSize = document.getElementById('dbPageSize').value;

				// API 호출 준비
				const data = {
					systemAvailability: parseFloat(systemAvailability),
					fragmentationDistance: parseInt(fragmentationDistance),
					dbPageSize: dbPageSize
				};

				console.log("Adjust DB data:", data);
				// TODO: API 호출 코드 추가
				// fetch('API_ENDPOINT', {
				//     method: 'POST',
				//     headers: {
				//         'Content-Type': 'application/json',
				//     },
				//     body: JSON.stringify(data)
				// })
				// .then(response => response.json())
				// .then(data => console.log('Success:', data))
				// .catch((error) => console.error('Error:', error));
			}
		});
	</script>
</body>

</html>
